<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Left decoration: file tree lines -->
  <g transform="translate(72, 80)" opacity="0.35" filter="url(#subtle-glow)">
    <!-- Tree structure -->
    <line x1="0" y1="0" x2="0" y2="140" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="0" y1="28" x2="20" y2="28" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="0" y1="56" x2="20" y2="56" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="0" y1="84" x2="20" y2="84" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="0" y1="112" x2="20" y2="112" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="0" y1="140" x2="20" y2="140" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Nested -->
    <line x1="20" y1="56" x2="20" y2="140" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="20" y1="84" x2="40" y2="84" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="20" y1="112" x2="40" y2="112" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="20" y1="140" x2="40" y2="140" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- File dots -->
    <circle cx="26" cy="28" r="3" fill="#a78bfa"/>
    <circle cx="26" cy="56" r="3" fill="#22d3ee"/>
    <circle cx="46" cy="84" r="3" fill="#a78bfa"/>
    <circle cx="46" cy="112" r="3" fill="#22d3ee"/>
    <circle cx="46" cy="140" r="3" fill="#a78bfa"/>
  </g>

  <!-- Right decoration: code block -->
  <g transform="translate(980, 68)" opacity="0.3" font-family="'Courier New', monospace" font-size="13" fill="#a78bfa">
    <text x="0" y="0" fill="#06b6d4">okf</text>
    <text x="30" y="0" fill="#e2e8f0"> generate ./src ./bundle</text>
    <text x="0" y="22" fill="#06b6d4">okf</text>
    <text x="30" y="22" fill="#e2e8f0"> lookup WorldBankConnector</text>
    <text x="0" y="44" fill="#06b6d4">okf</text>
    <text x="30" y="44" fill="#e2e8f0"> pairs ./bundle train.jsonl</text>
    <text x="0" y="66" fill="#4ade80">&#x2714;</text>
    <text x="16" y="66" fill="#64748b"> 10,645 concepts indexed</text>
    <text x="0" y="88" fill="#4ade80">&#x2714;</text>
    <text x="16" y="88" fill="#64748b"> 7 languages, zero config</text>
    <text x="0" y="110" fill="#4ade80">&#x2714;</text>
    <text x="16" y="110" fill="#64748b"> OKF v0.1 conformant</text>
  </g>

  <!-- Main title -->
  <text
    x="200"
    y="142"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="64"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#text-grad)"
    filter="url(#glow)"
  >okf-generator</text>

  <!-- Tagline -->
  <text
    x="202"
    y="186"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="0.3"
  >Open Knowledge Format toolkit — index any codebase for AI agents</text>

  <!-- Language pills -->
  <g transform="translate(202, 212)">
    <!-- Python -->
    <rect x="0" y="0" width="68" height="26" rx="13" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    <text x="34" y="17" font-family="sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Python</text>
    <!-- JS/TS -->
    <rect x="76" y="0" width="58" height="26" rx="13" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
    <text x="105" y="17" font-family="sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">JS/TS</text>
    <!-- Go -->
    <rect x="142" y="0" width="44" height="26" rx="13" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
    <text x="164" y="17" font-family="sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Go</text>
    <!-- Java -->
    <rect x="194" y="0" width="52" height="26" rx="13" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
    <text x="220" y="17" font-family="sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">Java</text>
    <!-- Rust -->
    <rect x="254" y="0" width="50" height="26" rx="13" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
    <text x="279" y="17" font-family="sans-serif" font-size="12" fill="#f87171" text-anchor="middle">Rust</text>
    <!-- Ruby -->
    <rect x="312" y="0" width="54" height="26" rx="13" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
    <text x="339" y="17" font-family="sans-serif" font-size="12" fill="#f472b6" text-anchor="middle">Ruby</text>
    <!-- SQL -->
    <rect x="378" y="0" width="50" height="26" rx="13" fill="#1e293b" stroke="#a3e635" stroke-width="1"/>
    <text x="403" y="17" font-family="sans-serif" font-size="12" fill="#bef264" text-anchor="middle">SQL</text>
  </g>

  <!-- OKF version tag -->
  <g transform="translate(202, 258)">
    <rect x="0" y="0" width="90" height="24" rx="4" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
    <text x="45" y="16" font-family="sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">OKF v0.1</text>
  </g>
  <g transform="translate(300, 258)">
    <rect x="0" y="0" width="110" height="24" rx="4" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="55" y="16" font-family="sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="600">tree-sitter AST</text>
  </g>
  <g transform="translate(418, 258)">
    <rect x="0" y="0" width="110" height="24" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
    <text x="55" y="16" font-family="sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="600">Claude Skill</text>
  </g>

  <!-- Accent bar bottom -->
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent)"/>
</svg>
