      .brand-sub { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #5b21b6; letter-spacing: 8px; }
      .brand-tag { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #71717a; letter-spacing: 3.5px; }
    </style>
  </defs>

  <!-- ICON: Vertically and horizontally centered relative to the text -->
  <g transform="translate(40, 18)">
