      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="grad4_dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
    <style>
