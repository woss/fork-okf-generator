# OKF Auto-Bundle — Copy this file into your repo as .github/workflows/okf-auto-bundle.yml
# 
# What it does:
#   On every push to main, generates an OKF knowledge bundle from your source code
#   and commits it to the repo so AI agents (Claude, Cursor, Copilot) always have
#   fresh context — no manual re-generation needed.
#
# Requirements:
#   - Python 3.11+
#   - Your source code lives in ./src (change the `okf generate` path to match)
#
# Customize:
#   - Change `okf generate ./src ./okf_bundle` to point at your source directory
#   - Add `--enrich deep` if you configure an LLM provider in .okfconfig
#   - See https://umairbaig8.github.io/okf-generator/user-guide/ci-cd/ for details

name: OKF Auto-Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust (for tree-sitter parsers with native deps)
        run: rustup show || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Install okf-generator
        run: pip install okf-generator

      - name: Generate OKF bundle
        run: |
          okf generate ./src ./okf_bundle
          echo "Concepts: $(find okf_bundle -name '*.md' | wc -l)"

      - name: Commit bundle
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update OKF bundle [skip ci]"
          file_pattern: okf_bundle/
          commit_user_name: okf-bot
          commit_user_email: bot@okf.dev
