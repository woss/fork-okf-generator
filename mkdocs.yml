site_name: okf-generator
site_description: High-velocity codebase parser — structured, agent-ready knowledge across 17 languages
site_url: https://umairbaig8.github.io/okf-generator/docs-site/
site_dir: build/docs-site
repo_url: https://github.com/UmairBaig8/okf-generator
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/okf-icon.svg
  favicon: images/okf-icon.svg
  palette:
    - scheme: default
      primary: deep_purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep_purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UmairBaig8/okf-generator
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/okf-generator/
      name: PyPI
  generator: false

copyright: Copyright &copy; 2026 Umair Baig — MIT License

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - CLI Reference: user-guide/cli-reference.md
      - Bundle Format: user-guide/bundle-format.md
      - Language Coverage: user-guide/languages-and-manifests.md
      - Agent Integration: user-guide/agent-integration.md
      - MCP Server: user-guide/mcp-server.md
      - LLM Enrichment: user-guide/enrichment.md
      - CI/CD Guide: user-guide/ci-cd.md
      - Visualization: user-guide/visualization.md
  - Comparison: comparison.md
  - Troubleshooting: troubleshooting.md
  - Development:
      - Architecture Overview: development/architecture.md
      - Adding a Language: development.md
      - Contributing: development/contributing.md
  - API Reference: user-guide/python-api.md
  - Changelog: changelog.md
