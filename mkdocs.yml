site_name: OKF Generator
site_description: High-velocity codebase parser — structured, agent-ready knowledge across 17 languages
site_url: https://umairbaig8.github.io/okf-generator/
site_dir: build/docs-site
repo_url: https://github.com/UmairBaig8/okf-generator

theme:
  name: material
  logo: images/okf-icon-white.svg
  favicon: images/okf-icon.svg
  palette:
    - scheme: default
      primary: deep_purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep_purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - header.autohide
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mike:
      version_selector: true
      canonical_version: latest
      alias_type: symlink

extra:
  version:
    provider: mike
    default: latest
  announce: 🚀 v0.1.41 shipped — Plugin system, 11 MCP tools, okf mcp --install, LLM-powered Q&A
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UmairBaig8/okf-generator
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/okf-generator/
      name: PyPI
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 Umair Baig — MIT License

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Configuration: getting-started/configuration.md
  - Core Concepts:
      - Bundle Format: user-guide/bundle-format.md
      - Language Coverage: user-guide/languages-and-manifests.md
      - Domain Classification: user-guide/domain-classification.md
      - LLM Enrichment: user-guide/enrichment.md
  - Using OKF:
      - CLI Reference: user-guide/cli-reference.md
      - Codebase Q&A: user-guide/ask.md
      - Visualization: user-guide/visualization.md
  - Integration:
      - Agent Integration: user-guide/agent-integration.md
      - MCP Server: user-guide/mcp-server.md
      - CI/CD Guide: user-guide/ci-cd.md
  - Extending:
      - Plugin Development: user-guide/plugins.md
      - Adding a Language: development.md
  - Reference:
      - Python API: user-guide/python-api.md
      - Comparison: comparison.md
      - Troubleshooting: troubleshooting.md
  - Development:
      - Architecture Overview: development/architecture.md
      - Contributing: development/contributing.md
  - Future Plans: future.md
  - Changelog: changelog.md
