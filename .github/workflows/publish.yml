name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to PyPI + GitHub Release
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust (for tree-sitter-kotlin source build)
        run: rustup show || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run: pip install build
      - run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog section for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Install Rust (for tree-sitter-kotlin source build)
        run: rustup show || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Smoke test published package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Retry loop: PyPI CDN propagation can take 30-60s after publish.
          # We retry both the 'versions' check AND the install itself because
          # the CDN edge pip index hits may differ from the one pip install uses.
          for attempt in $(seq 10); do
            echo "--- Smoke attempt $attempt/10 ---"

            # Wait for PyPI to index the new version
            pip index versions okf-generator 2>/dev/null | grep -q "$VERSION" \
              && echo "Found v$VERSION on PyPI" \
              || { echo "Version not found yet, waiting 5s..."; sleep 5; continue; }

            # Also wait before install — the version check CDN edge may be
            # ahead of the install CDN edge
            sleep 3

            # Install in isolated venv
            rm -rf /tmp/smoke_venv
            python3 -m venv /tmp/smoke_venv

            if /tmp/smoke_venv/bin/pip install --quiet "okf-generator==$VERSION"; then
              echo "Install succeeded v$VERSION"
            else
              echo "Install failed — CDN may still be propagating, retrying..."
              sleep 5
              continue
            fi

            # Quick smoke: generate, lookup, verify
            /tmp/smoke_venv/bin/okf --help \
              && /tmp/smoke_venv/bin/okf generate tests/fixtures/realworld /tmp/smoke_bundle \
              && /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --type Dependency --compact | grep -q "Dependency" \
              && /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --tag lang:python --compact | grep -q "Function" \
              && /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --json --limit 200 "Paginated" | python3 -c "import json,sys; d=json.load(sys.stdin); assert len(d) >= 1" \
              && /tmp/smoke_venv/bin/okf pairs /tmp/smoke_bundle /tmp/smoke_pairs.jsonl \
              && /tmp/smoke_venv/bin/okf summarize /tmp/smoke_bundle \
              && { echo "Smoke test PASSED v$VERSION"; exit 0; } \
              || { echo "Smoke test failed, retrying..."; sleep 5; }
          done

          echo "Smoke test FAILED after 10 attempts"
          exit 1

      - name: Generate full test report
        run: |
          pip install -e ".[dev]" -q
          bash tests/test.sh 2>&1

      - name: Upload test report to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TEST_REPORT.html
            TEST_REPORT.md
          body_path: release_notes.md
          append_body: true
          generate_release_notes: false