name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to PyPI + GitHub Release
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install build
      - run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog section for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Smoke test published package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Wait for PyPI to index the new version (retry up to 30s)
          for i in $(seq 15); do
            if pip index versions okf-generator 2>/dev/null | grep -q "$VERSION"; then
              echo "Found v$VERSION on PyPI"
              break
            fi
            echo "Waiting for PyPI index... (${i}s)"
            sleep 2
          done

          # Install in isolated venv (no editable install tricks)
          python3 -m venv /tmp/smoke_venv
          /tmp/smoke_venv/bin/pip install --quiet "okf-generator==$VERSION"

          # Quick smoke: generate, lookup, verify
          /tmp/smoke_venv/bin/okf --help
          /tmp/smoke_venv/bin/okf generate tests/fixtures/realworld /tmp/smoke_bundle
          /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --type Dependency --compact | grep -q "Dependency"
          /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --tag lang:python --compact | grep -q "Function"
          /tmp/smoke_venv/bin/okf lookup --bundle /tmp/smoke_bundle --json --limit 200 "Paginated" | python3 -c "import json,sys; d=json.load(sys.stdin); assert len(d) >= 1"

          # Smoke: pairs (static), summarize
          /tmp/smoke_venv/bin/okf pairs /tmp/smoke_bundle /tmp/smoke_pairs.jsonl
          /tmp/smoke_venv/bin/okf summarize /tmp/smoke_bundle
          echo "Smoke test PASSED v$VERSION"

      - name: Generate full test report
        run: |
          pip install -e ".[dev]" -q
          bash tests/test.sh 2>&1

      - name: Upload test report to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TEST_REPORT.html
            TEST_REPORT.md
          body_path: release_notes.md
          append_body: true
          generate_release_notes: false