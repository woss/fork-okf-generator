<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKF Bundle — Knowledge Visualization</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◇</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0f; --surface:#131319; --surface-2:#191922; --surface-3:#1f1f2b;
  --border:#26262f; --border-strong:#34343f;
  --text:#f2f2f5; --text-2:#a3a3b5; --text-3:#6f6f82;
  --accent:#7c6cff; --accent-strong:#9385ff; --accent-soft:rgba(124,108,255,.14);
  --danger:#f87171; --danger-soft:rgba(248,113,113,.12);
  --success:#4ade80; --warning:#fbbf24;
  --brand-400:#a855f7; --brand-500:#8b5cf6; --brand-600:#7c3aed; --brand-800:#5b21b6; --brand-900:#4c1d95;
  --t-class:#a78bfa; --t-function:#38bdf8; --t-module:#fbbf24; --t-dependency:#4ade80;
  --t-table:#fb7185; --t-view:#fb923c; --t-index:#f472b6; --t-method:#c084fc;
  --t-interface:#22d3ee; --t-type:#818cf8; --t-trigger:#f43f5e;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 8px 32px rgba(0,0,0,.35);
  --shadow-glow:0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,.35);
  --ease:cubic-bezier(.2,.8,.2,1);

  /* Ambient glow for dark theme */
  --bg-image: none;
}

html[data-theme="light"] {
  --bg:#f7f7fb; --surface:#ffffff; --surface-2:#f4f4f9; --surface-3:#ececf4;
  --border:#e3e3ec; --border-strong:#d3d3e0;
  --text:#131320; --text-2:#5c5c72; --text-3:#8a8aa0;
  --accent:#6d5efc; --accent-strong:#5847e8; --accent-soft:rgba(109,94,252,.10);
  --danger:#dc2626; --danger-soft:rgba(220,38,38,.08);
  --success:#22c55e; --warning:#d97706;
  --brand-400:#a855f7; --brand-500:#8b5cf6; --brand-600:#7c3aed; --brand-800:#5b21b6; --brand-900:#4c1d95;
  --shadow-sm:0 1px 2px rgba(20,20,40,.06);
  --shadow-md:0 8px 24px rgba(20,20,40,.08);
  --shadow-lg:0 8px 32px rgba(20,20,40,.08);
  --shadow-glow:0 0 0 1px var(--border), 0 8px 24px rgba(20,20,40,.08);

  --bg-image: none;
}
html[data-theme="light"] .stat-card {
  background:rgba(255,255,255,.15); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(0,0,0,.08);
}
html[data-theme="light"] .stat-card::after {
  box-shadow:inset 0 1px 1px rgba(255,255,255,1);
}
html[data-theme="light"] .stat-card:hover {
  background:rgba(255,255,255,.9); border-color:rgba(0,0,0,.1);
  box-shadow:0 12px 32px rgba(20,20,40,.1), 0 0 0 1px var(--accent-soft);
}
html[data-theme="light"] .sec pre { background:rgba(0,0,0,.02); }
html[data-theme="light"] .chip { background:rgba(0,0,0,.03); border-color:rgba(0,0,0,.08); }

body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text); height:100vh; overflow:hidden;
  font-size:14px; line-height:1.5;

  background-color:var(--bg);
  background-image:var(--bg-image);
  background-size:cover;

  transition:background-color .18s var(--ease), color .18s var(--ease);
}


code, pre, .mono { font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; }
::selection { background:var(--accent); color:#fff; }
:focus-visible { outline:2px solid var(--accent-strong); outline-offset:2px; border-radius:4px; }
a { color:inherit; }
button, select, input { font:inherit; }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:99px; border:2px solid var(--bg); }
::-webkit-scrollbar-track { background:transparent; }

#topbar {
  height:60px; display:flex; align-items:center; justify-content:center;
  position:sticky; top:0; z-index:50; padding:0;
}
#topbar-inner {
  width:92%; max-width:1200px; height:46px;
  display:flex; align-items:center; gap:var(--sp-4); padding:0 16px;
  border-radius:16px;
  background:rgba(255,255,255,.08); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 32px rgba(0,0,0,.3), 0 1px 4px rgba(0,0,0,.15);
  position:relative;
}

html[data-theme="light"] #topbar-inner {
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-color:rgba(0,0,0,.08);
  box-shadow:0 4px 32px rgba(20,20,40,.08), 0 1px 4px rgba(20,20,40,.04);
}
.nav-seg {
  display:flex; border-radius:10px; background:rgba(255,255,255,.06); padding:3px; gap:2px;
}
html[data-theme="light"] .nav-seg { background:rgba(0,0,0,.04); }
.nav-seg-item {
  font-size:13px; font-weight:500; color:var(--text-3); padding:4px 18px;
  border-radius:8px; cursor:pointer; transition:all .2s var(--ease); user-select:none;
  background:transparent; border:none; font-family:inherit;
}
.nav-seg-item:hover { color:var(--text-2); }
.nav-seg-item.active {
  color:var(--text); background:var(--surface);
  box-shadow:0 1px 3px rgba(0,0,0,.12);
}
#brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.nav-logo-icon { display:flex; align-items:center; justify-content:center; width:30px; height:30px; flex-shrink:0; }
#brand-text .name { font-weight:700; font-size:15px; color:var(--text); white-space:nowrap; }
#topbar-spacer { flex:1; }

#breadcrumb {
  display:flex; align-items:center; gap:6px; padding:var(--sp-3) var(--sp-4);
  margin-bottom:var(--sp-3); margin-top:0;
  background:rgba(255,255,255,.04); border-radius:var(--r-md);
  border:1px solid rgba(255,255,255,.06); font-size:12px;
  position:sticky; top:0; z-index:10;
}
html[data-theme="light"] #breadcrumb {
  background:rgba(0,0,0,.03);
  border-color:rgba(0,0,0,.06);
}
#breadcrumb .crumb {
  cursor:pointer; color:var(--text-3); padding:2px 8px; border-radius:var(--r-sm);
  transition:all .15s var(--ease); font-weight:500;
}
#breadcrumb .crumb:hover { color:var(--accent-strong); background:var(--accent-soft); }
#breadcrumb .sep { color:var(--border-strong); font-size:10px; user-select:none; }
#breadcrumb .current { color:var(--text); background:var(--surface); font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,.06); }
.icon-btn {
  width:34px; height:34px; border-radius:var(--r-sm); background:transparent; border:1px solid transparent;
  color:var(--text-2); display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:background .15s var(--ease), color .15s var(--ease), border-color .15s var(--ease);
}
.icon-btn:hover { background:var(--surface-2); color:var(--text); border-color:var(--border); }
.icon-btn svg { width:17px; height:17px; }

#layout { display:flex; height:calc(100vh - 60px); }

#sidebar {
  width:300px; border-radius:var(--r-xl);
  display:flex; flex-direction:column; flex:none; overflow:hidden;
  margin:var(--sp-3) 0 var(--sp-3) var(--sp-3);
  background:rgba(19,19,25,.72); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:var(--shadow-md);
  position:relative;
}

html[data-theme="light"] #sidebar {
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-color:rgba(0,0,0,.08);
}
#main { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
#main.wide { padding:0; }
#browse-layout { display:flex; flex:1; min-height:0; padding:var(--sp-4); gap:0; }
#browse-content {
  flex:1; display:flex; flex-direction:column; min-height:0; overflow:auto;
  padding:var(--sp-4); margin:var(--sp-3) var(--sp-3) var(--sp-3) 0;
  background:rgba(19,19,25,.6); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.06); border-radius:var(--r-xl);
  box-shadow:var(--shadow-md);
}
html[data-theme="light"] #browse-content {
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-color:rgba(0,0,0,.08);
}
#sidebar-resize {
  width:4px; cursor:col-resize; background:var(--border); flex:none;
  transition:background .12s var(--ease); position:relative; z-index:10;
  margin:100px 0;
  border-radius:4px; background-clip:content-box;
  background:linear-gradient(to bottom, transparent 0, var(--border) 20%, var(--border) 80%, transparent 100%);
}
#sidebar-resize:hover, #sidebar-resize.active { background:var(--accent); background-clip:content-box; }
.field-wrap { padding:var(--sp-3) var(--sp-3) 0; }
.search-box { position:relative; }
.search-box svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-3); pointer-events:none; }
#search {
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:8px 10px 8px 30px; color:var(--text); font-size:13px; outline:none;
  transition:border-color .15s var(--ease), background .15s var(--ease);
}
#search:focus { border-color:var(--accent); background:var(--surface); }
#search::placeholder { color:var(--text-3); }
.filter-row { display:flex; flex-direction:column; gap:4px; margin-top:var(--sp-2); }
.filter-row select {
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-sm);
  color:var(--text-2); padding:6px 8px; font-size:12px; outline:none; cursor:pointer;
}
.filter-row select:focus { border-color:var(--accent); }
.filter-row select option { background:var(--surface); }



#tree { flex:1; overflow-y:auto; padding:var(--sp-2) var(--sp-2) var(--sp-2); margin-top:var(--sp-2); }
.tree-folder { user-select:none; }
.tree-folder-label {
  display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:var(--r-sm); cursor:pointer;
  font-size:12.5px; font-weight:500; color:var(--text-2); transition:background .12s var(--ease);
}
.tree-folder-label:hover { background:var(--surface-2); color:var(--text); }
.tree-folder-label .caret { width:10px; height:10px; flex:none; transition:transform .15s var(--ease); color:var(--text-3); }
.tree-folder.collapsed > .tree-folder-children { display:none; }
.tree-folder.collapsed > .tree-folder-label .caret { transform:rotate(-90deg); }
.tree-folder-children { padding-left:12px; border-left:1px solid var(--border); margin-left:13px; }
.tree-leaf {
  display:flex; align-items:center; gap:9px; padding:6px 8px 6px 11px; border-radius:var(--r-sm); cursor:pointer;
  font-size:13px; color:var(--text); position:relative; transition:background .12s var(--ease);
}
.tree-leaf:hover { background:var(--surface-2); }
.tree-leaf.active { background:var(--accent-soft); color:var(--accent-strong); font-weight:600; }
.tree-leaf.active::before { content:''; position:absolute; left:-13px; top:0; bottom:0; width:2px; background:var(--accent); border-radius:2px; }
.tree-leaf .dot { width:7px; height:7px; border-radius:50%; flex:none; }
.tree-leaf .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hidden { display:none !important; }
.visually-hidden { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

#main.wide { padding:0; }
.tab-content { display:none; min-height:0; }
#tab-browse.active { display:flex; flex-direction:column; flex:1; overflow:hidden; }
#tab-graph.active { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.fade-in { animation:fadeIn .18s var(--ease); }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

.tab-content { display:none; }
.tab-content.active { display:block; }

.eyebrow { font-size:11px; font-weight:600; color:var(--accent-strong); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
#landing h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; margin-bottom:8px; }
#landing p.sub { color:var(--text-2); font-size:14px; margin-bottom:var(--sp-6); }
.stat-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:var(--sp-4); margin-bottom:var(--sp-6);
}
.stat-card {
  background:rgba(19,19,25,.6); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.06); border-radius:var(--r-lg);
  padding:var(--sp-5); position:relative;
  transition:all .2s var(--ease);
}
.stat-card::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.08);
  pointer-events:none;
}
.stat-card:hover {
  border-color:rgba(255,255,255,.12);
  background:rgba(25,25,34,.7);
  box-shadow:0 0 0 1px var(--accent-soft);
}
.stat-card .n { font-size:24px; font-weight:700; letter-spacing:-.03em; }
.stat-card .l { font-size:11px; color:var(--text-3); margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
#landing .domains { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-2); align-items:start; }
#landing .domains { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-2) var(--sp-5); align-items:start; max-height:300px; overflow-y:auto; }
#landing { padding-bottom:100px; }
#landing .domains h3 { font-size:12px; color:var(--text-3); margin-bottom:var(--sp-3); text-transform:uppercase; letter-spacing:.06em; font-weight:600; grid-column:1/-1; }
.domain-row {
  display:flex; align-items:center; padding:8px 12px; border-radius:var(--r-sm); cursor:pointer;
  transition:background .12s var(--ease), border-color .12s var(--ease); border:1px solid transparent;
}
.domain-row:hover { background:var(--surface); border-color:var(--border); }
.domain-row .name { font-size:13px; font-weight:500; }
.domain-row .count { font-size:12px; color:var(--text-3); }
.domain-row .bar-wrap { flex:1; margin:0 var(--sp-4); height:6px; background:var(--surface-2); border-radius:99px; overflow:hidden; }
.domain-row .bar { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-strong)); border-radius:99px; }

#detail { max-width:1360px; display:flex; flex-direction:column; flex:1; min-height:0; }
.detail-tab-content { display:none; flex:1; min-height:0; overflow:auto; }
.detail-tab-content.active { display:flex; flex-direction:column; }
#detail-header {
  position:sticky; top:0; z-index:9;
  padding:var(--sp-5) var(--sp-5) var(--sp-4);
  margin:calc(-1 * var(--sp-4)) calc(-1 * var(--sp-4)) var(--sp-3);
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;
}
html[data-theme="light"] #detail-header {
  border-bottom-color:rgba(0,0,0,.06);
}
#detail-header.hidden { display:none; }
#detail-topbar { display:flex; align-items:center; justify-content:space-between; gap:var(--sp-3); flex-wrap:wrap; min-height:28px; }
#detail-topbar + #detail-topbar { margin-top:2px; }
#detail-topbar-left { display:flex; flex-direction:column; align-items:flex-start; }
#detail-topbar-right { display:flex; align-items:center; gap:var(--sp-2); flex-shrink:0; }
#detail-topbar .resource { font-size:11px; color:var(--text-3); }
.vs-btn {
  display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:99px; font-size:10.5px; font-weight:700;
  border:1px solid var(--border); cursor:pointer; color:var(--accent-strong); background:var(--accent-soft);
  transition:background .12s var(--ease), border-color .12s var(--ease);
}
.vs-btn:hover { background:var(--accent-strong); color:#fff; border-color:var(--accent-strong); }
#detail .desc { color:var(--text-2); font-size:14px; margin:var(--sp-2) 0 0; max-width:760px; }
.type-badge {
  display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.04em; margin-bottom:var(--sp-3);
}
.type-badge .dot { width:6px; height:6px; border-radius:50%; }
#detail h2 { font-size:24px; font-weight:700; letter-spacing:-.02em; margin-bottom:6px; }
#detail p.desc { color:var(--text-2); font-size:14.5px; margin:6px 0; max-width:760px; }
#detail p.resource {
  font-size:12px; color:var(--text-3); margin-top:var(--sp-2); display:inline-flex; align-items:center; gap:6px;
  background:var(--surface-2); border:1px solid var(--border); padding:4px 10px; border-radius:var(--r-sm);
}
#detail-meta { display:flex; flex-wrap:wrap; gap:6px; margin:var(--sp-3) 0 var(--sp-5); }
.meta-tag {
  display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:99px;
  font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em;
  background:var(--surface-2); border:1px solid var(--border); color:var(--text-2);
}
.meta-tag .label { color:var(--text-3); font-weight:400; text-transform:none; }
.meta-tag-vis { background:var(--accent-soft); border-color:var(--accent); color:var(--accent-strong); }

/* ---- Cosmos Explore Tab ---- */
#graph-main { display:flex; flex:1; min-height:0; gap:var(--sp-3); padding:var(--sp-3); }
#cosmos-stage { position:relative; flex:0 0 70%; border-radius:var(--r-xl); overflow:hidden; background:var(--bg); border:1px solid rgba(255,255,255,.07); }
#cosmos-canvas { position:absolute; inset:0; z-index:9; pointer-events:none; width:100%; height:100%; }
#cluster-labels { position:absolute; inset:0; z-index:15; pointer-events:none; }
#graph-sidebar { flex:0 0 calc(30% - var(--sp-3)); display:flex; flex-direction:column; background:rgba(19,19,25,.72); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,.07); border-radius:var(--r-xl); box-shadow:var(--shadow-md); overflow:hidden; }
html[data-theme="light"] #graph-sidebar { background:rgba(255,255,255,.1); border-color:rgba(0,0,0,.08); }
#gs-header { display:flex; flex-direction:column; justify-content:start; padding:var(--sp-4) var(--sp-4) var(--sp-3); border-bottom:1px solid var(--border); flex:0 0 auto; gap:var(--sp-1); }
#gs-header .top { display:flex; align-items:center; gap:var(--sp-2); flex-wrap:wrap; }
#gs-title { font-size:13px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#gs-tabs { display:flex; flex:0 0 auto; border-bottom:1px solid var(--border); padding:0 var(--sp-2); gap:0; }
.gs-tab { flex:1; background:transparent; border:none; color:var(--text-3); font-size:12px; font-weight:600; padding:var(--sp-2) var(--sp-2); cursor:pointer; transition:all .12s var(--ease); font-family:inherit; border-bottom:2px solid transparent; }
.gs-tab:hover { color:var(--text-2); }
.gs-tab.active { color:var(--accent-strong); border-bottom-color:var(--accent); }
#gs-body { flex:1; min-height:0; overflow:auto; }
.gs-pane { display:none; padding:var(--sp-4); }
.gs-pane.active { display:block; }
.gs-pane .gs-section { margin-bottom:var(--sp-3); padding-bottom:var(--sp-3); border-bottom:1px solid var(--border); }
.gs-pane .gs-section:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.gs-pane .gs-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); margin-bottom:var(--sp-2); }
.gs-pane .gs-desc { font-size:13px; color:var(--text-2); line-height:1.6; }
.gs-pane .gs-meta { display:flex; flex-wrap:wrap; gap:4px; }
.gs-pane .gs-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-2); }

}

#cosmos-search::placeholder { color:var(--text-3); }

.dropdown-btn {
  background:transparent; border:1px solid transparent; color:var(--text-2); border-radius:6px;
  padding:5px 10px; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit;
  display:flex; align-items:center; gap:6px; white-space:nowrap; transition:all .15s var(--ease);
}
.dropdown-btn:hover { background:var(--surface-2); }
.dropdown-btn.active { background:var(--accent-soft); color:var(--accent-strong); border-color:var(--accent); }
.dropdown-btn .badge { background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:99px; }
.dropdown-wrapper { position:relative; }
.dropdown-menu {
  position:absolute; top:calc(100% + 6px); left:0; z-index:100; min-width:180px; max-height:300px;
  background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg); overflow:hidden; display:none; flex-direction:column;
}
.dropdown-menu.open { display:flex; }
.dropdown-list { max-height:260px; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:2px; }

.dropdown-item {
  display:flex; align-items:center; justify-content:space-between; padding:6px 10px; border-radius:6px;
  color:var(--text); font-size:12px; cursor:pointer; transition:background .1s; user-select:none;

.item-left { display:flex; align-items:center; gap:8px; }
.item-cb {
  width:14px; height:14px; border-radius:4px; border:2px solid var(--border-strong); flex:none;
  display:flex; align-items:center; justify-content:center; transition:all .12s var(--ease);
}
.dropdown-item.on .item-cb { background:var(--accent); border-color:var(--accent); }
.dropdown-item.on .item-cb::after { content:'✓'; color:#fff; font-size:9px; font-weight:700; }
.item-count { font-size:10px; color:var(--text-3); background:var(--surface-2); padding:1px 6px; border-radius:99px; font-weight:600; }
.dropdown-item .dot { width:7px; height:7px; border-radius:50%; flex:none; }

.toolbar-sep { width:1px; align-self:stretch; background:var(--border); margin:2px 0; flex:0 0 auto; }
#status-pill {
  position:absolute; top:16px; left:16px; z-index:20; font-size:11px; color:var(--text-3);
  background:rgba(19,19,25,.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08); border-radius:99px; padding:7px 12px; box-shadow:var(--shadow-md);
}

#hover-tag {
  position:absolute; z-index:25; pointer-events:none; font-size:11.5px; font-weight:600;

  padding:5px 10px; border-radius:8px; box-shadow:var(--shadow-md);
  opacity:0; transition:opacity .1s; transform:translate(-50%,-130%);
}
#hover-tag.show { opacity:1; }
#hover-tag .type { color:var(--text-3); font-weight:500; margin-left:5px; }
#cosmos-legend {
  position:absolute; bottom:16px; left:16px; z-index:20; border-radius:12px;
  background:rgba(19,19,25,.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08); box-shadow:var(--shadow-md); overflow:hidden;
}
html[data-theme="light"] #cosmos-legend { background:rgba(255,255,255,.75); border-color:rgba(0,0,0,.08); }
#cosmos-legend-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:10px 12px; cursor:pointer; }
#cosmos-legend-head span.t { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); }
#cosmos-legend-head svg { width:12px; height:12px; color:var(--text-3); transition:transform .15s var(--ease); }
#cosmos-legend.collapsed #cosmos-legend-body { display:none; }
#cosmos-legend.collapsed #cosmos-legend-body { display:none; }

#cosmos-legend-body { padding:0 12px 12px; display:flex; flex-direction:column; gap:4px; }
.legend-item { display:flex; align-items:center; gap:8px; padding:3px 6px; border-radius:6px; font-size:11px; font-weight:500; color:var(--text-2); }
.legend-item .dot { width:8px; height:8px; border-radius:50%; flex:none; }
.legend-item .count { color:var(--text-3); margin-left:auto; font-size:10px; font-weight:600; }
#zoomctl {
  position:absolute; bottom:16px; right:16px; z-index:20; display:flex; flex-direction:column; gap:2px;
  border-radius:12px; background:rgba(19,19,25,.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08); box-shadow:var(--shadow-md); overflow:hidden;
}
html[data-theme="light"] #zoomctl { background:rgba(255,255,255,.75); border-color:rgba(0,0,0,.08); }
#zoomctl button {

  display:flex; align-items:center; justify-content:center; transition:background .12s var(--ease),color .12s var(--ease);
}
#zoomctl button:hover { background:var(--surface-2); color:var(--text); }
#zoomctl button:not(:last-child) { border-bottom:1px solid var(--border); }
#zoomctl svg { width:16px; height:16px; }
.detail-btn:hover { background:var(--accent); color:#fff; }
.detail-btn svg { width:13px; height:13px; }

/* ---- Parse Tree ---- */
#code-split-parse .parse-node {
  padding:2px 0 2px 20px; cursor:default; white-space:nowrap;
  border-left:1px solid var(--border); margin-left:10px;
}
.parse-node.root { margin-left:0; border-left:none; padding-left:0; }
.parse-node .node-toggle {

  color:var(--text-3); font-size:10px; margin-left:-18px;
}
.parse-node .node-type { color:var(--accent-strong); font-weight:500; }
.parse-node .node-text { color:var(--text-2); }
.parse-node .node-text.str { color:#fbbf24; }
.parse-node .node-text.num { color:#fb923c; }
.parse-node .node-text.kw { color:#f472b6; font-weight:500; }
.parse-node .node-text.id { color:#38bdf8; }
.parse-node.collapsed > .parse-children { display:none; }
.parse-node.collapsed > .node-toggle { transform:rotate(0deg); }
.parse-node:not(.collapsed) > .node-toggle { transform:rotate(90deg); }
.parse-node .parse-range { font-size:10px; color:var(--text-3); margin-left:6px; }
.close-btn {
  width:30px; height:30px; border-radius:var(--r-sm); background:transparent; border:1px solid transparent;

html[data-theme="light"] .token.punctuation,

#detail-tab-bar { display:flex; gap:0; margin:0 0 var(--sp-4); padding:var(--sp-1); background:rgba(255,255,255,.04); border-radius:var(--r-md); border:1px solid rgba(255,255,255,.06); width:fit-content; }

.detail-tab {

#code-split { display:flex; min-height:400px; flex:1; gap:0; border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; }
#code-split-source { flex:1; overflow:auto; padding:var(--sp-4); background:var(--surface); }

#code-split-divider { width:4px; cursor:col-resize; background:var(--border); flex:none; }
#code-split-divider:hover { background:var(--accent); }
#code-split-parse { flex:1; overflow:auto; padding:var(--sp-4); }
.code-placeholder { color:var(--text-3); font-size:13px; text-align:center; padding:var(--sp-8); }

.sec {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
  margin-bottom:var(--sp-4); margin-top:var(--sp-4); overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.15);

}
.sec::before { display:none; }
.sec:hover { border-color:var(--border-strong); }
.sec h3 {

  background:transparent; margin:0;
}
.sec pre {

.param-row { display:flex; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--border); }

.param-default { color:var(--text-3); margin-left:auto; font-size:11px; }
.returns-val { font-size:13px; color:var(--text-2); padding:var(--sp-3); }
.chip-list { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:var(--r-md);
  font-size:12px; font-family:'JetBrains Mono',ui-monospace,monospace;

}

.chip .dot { width:6px; height:6px; border-radius:50%; flex:none; }
.markdown-body { font-size:13.5px; color:var(--text-2); }

#ego-graph { height:280px; width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-md); }

.loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:13px; gap:8px; color:var(--text-3); }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }

@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; } }
</style>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/web-tree-sitter@0.20.8/tree-sitter.js"></script>
<script>
var DYNAMIC = {DYNAMIC_FLAG};
var BUNDLE_DATA = {BUNDLE_DATA};

var TYPE_COLORS = {
  Class:"#a78bfa", Dependency:"#4ade80", Function:"#38bdf8",
  Index:"#f472b6", Interface:"#22d3ee", Method:"#c084fc",
  Module:"#fbbf24", Table:"#fb7185", Trigger:"#f43f5e",
  Type:"#818cf8", View:"#fb923c",
};

var __nodeById = {};
var __adj = {};

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function qs(id) { return document.getElementById(id); }

// ---- Data Layer ----
async function api(path) { var r = await fetch(path); return r.json(); }

function buildStaticIndex(data) {
  (data.nodes || []).forEach(function(n) { __nodeById[n.id] = n; });
  (data.nodes || []).forEach(function(n) { __adj[n.id] = new Set(); });
  (data.links || []).forEach(function(l) {
    if (__adj[l.source]) __adj[l.source].add(l.target);
    if (__adj[l.target]) __adj[l.target].add(l.source);
  });
}

async function getData() {
  if (!DYNAMIC && BUNDLE_DATA && BUNDLE_DATA.nodes) {
    if (Object.keys(__nodeById).length === 0) buildStaticIndex(BUNDLE_DATA);
    return { type: 'static', data: BUNDLE_DATA, nodeById: __nodeById, adj: __adj };
  }
  if (DYNAMIC) return { type: 'dynamic' };
  return null;
}

async function searchConcepts(q, typeFilter, langFilter, limit) {
  limit = limit || 200;
  if (DYNAMIC) {
    var url = '/api/search?q=' + encodeURIComponent(q) + '&type=' + encodeURIComponent(typeFilter) + '&limit=' + limit;
    if (langFilter) url += '&tag=' + encodeURIComponent('lang:' + langFilter);
    return await api(url);
  }
  if (!BUNDLE_DATA || !BUNDLE_DATA.nodes) return [];
  var res = BUNDLE_DATA.nodes;
  if (q) {
    var tokens = q.toLowerCase().split(/\s+/).filter(Boolean);
    res = res.filter(function(n) {
      var text = (n.title + ' ' + (n.id || '') + ' ' + (n.description || '')).toLowerCase();
      return tokens.every(function(t) { return text.includes(t); });
    });
  }
  if (typeFilter) res = res.filter(function(n) { return n.type === typeFilter; });
  if (langFilter) res = res.filter(function(n) { return (n.tags || []).indexOf('lang:' + langFilter) >= 0; });
  return res.map(function(n) { return { concept_id: n.id, title: n.title, type: n.type, resource: n.resource, description: n.description, tags: n.tags || [] }; });
}

async function getConcept(id) {
  if (DYNAMIC) return await api('/api/concept/' + encodeURIComponent(id));
  return __nodeById[id] || null;
}

async function getInfo() {
  if (DYNAMIC) return await api('/api/info');
  if (!BUNDLE_DATA || !BUNDLE_DATA.nodes) return { total: 0, types: {}, languages: {} };
  var types = {}, langs = {};
  BUNDLE_DATA.nodes.forEach(function(n) {
    types[n.type] = (types[n.type] || 0) + 1;
    (n.tags || []).forEach(function(t) {
      if (t.indexOf('lang:') === 0 && t !== 'lang:manifest') langs[t.slice(5)] = (langs[t.slice(5)] || 0) + 1;
    });
  });
  return { total: BUNDLE_DATA.nodes.length, types: types, languages: langs, name: BUNDLE_DATA.bundle_name || 'okf_bundle' };
}

async function getTypes() {
  if (DYNAMIC) return await api('/api/types');
  if (!BUNDLE_DATA || !BUNDLE_DATA.nodes) return [];
  var counts = {};
  BUNDLE_DATA.nodes.forEach(function(n) { counts[n.type] = (counts[n.type] || 0) + 1; });
  return Object.keys(counts).sort().map(function(k) { return { type: k, count: counts[k] }; });
}

async function getLanguages() {
  if (DYNAMIC) return await api('/api/languages');
  if (!BUNDLE_DATA || !BUNDLE_DATA.nodes) return [];
  var counts = {};
  BUNDLE_DATA.nodes.forEach(function(n) {
    (n.tags || []).forEach(function(t) {
      if (t.indexOf('lang:') === 0 && t !== 'lang:manifest') counts[t.slice(5)] = (counts[t.slice(5)] || 0) + 1;
    });
  });
  return Object.keys(counts).sort().map(function(k) { return { language: k, count: counts[k] }; });
}

async function getGraph(maxNodes) {
  if (DYNAMIC) return await api('/api/graph?max_nodes=' + (maxNodes || 120));
  if (!BUNDLE_DATA) return { nodes: [], edges: [] };
  var nodes = (BUNDLE_DATA.nodes || []).slice(0, maxNodes || 120).map(function(n) {
    return { id: n.id, label: n.title, title: n.type + ': ' + n.title, group: n.type };
  });
  return { nodes: nodes, edges: (BUNDLE_DATA.links || []).slice(0, 300), total: BUNDLE_DATA.nodes.length, shown: nodes.length };
}

function getEgoElements(conceptId, concept) {
  if (!DYNAMIC && __nodeById[conceptId]) {
    var neighbors = Array.from(__adj[conceptId] || []);
    var nodes = [{ data: { id: conceptId, label: __nodeById[conceptId].title, type: __nodeById[conceptId].type } }];
    neighbors.forEach(function(nid) {
      var n = __nodeById[nid];
      if (n) nodes.push({ data: { id: nid, label: n.title, type: n.type } });
    });
    var edges = [];
    (BUNDLE_DATA.links || []).forEach(function(l) {
      if (l.source === conceptId || l.target === conceptId)
        edges.push({ data: { source: l.source, target: l.target } });
    });
    return { elements: { nodes: nodes, edges: edges } };
  }
  var els = [];
  var added = {};
  els.push({ data: { id: conceptId, label: concept.title, type: concept.type } });
  added[conceptId] = true;
  function addRel(items, dir) {
    (items || []).forEach(function(r) {
      if (!added[r.concept_id]) {
        els.push({ data: { id: r.concept_id, label: r.title, type: 'Unknown' } });
        added[r.concept_id] = true;
      }
      if (dir === 'in') els.push({ data: { source: r.concept_id, target: conceptId } });
      else els.push({ data: { source: conceptId, target: r.concept_id } });
    });
  }
  addRel(concept.related, 'out');
  addRel(concept.calls, 'out');
  addRel(concept.called_by, 'in');
  addRel(concept.used_by, 'in');
  return { elements: els };
}

// ---- Init ----
async function init() {
  if (!DYNAMIC && BUNDLE_DATA && BUNDLE_DATA.nodes) buildStaticIndex(BUNDLE_DATA);

  await getInfo();

  var types = await getTypes();
  var sel = qs('type-filter');
  types.forEach(function(t) {
    var o = document.createElement('option');
    o.value = t.type; o.textContent = t.type + ' (' + t.count + ')';
    sel.appendChild(o);
  });

  var langs = await getLanguages();
  var lsel = qs('lang-filter');
  langs.forEach(function(l) {
    var o = document.createElement('option');
    o.value = l.language; o.textContent = l.language + ' (' + l.count + ')';
    lsel.appendChild(o);
  });

  await doSearch();

  // Populate bundle dropdown with counts from search results
  var bundleCounts = {};
  currentResults.forEach(function(c) {
    var seg = (c.concept_id || '').split('/')[0];
    if (seg) bundleCounts[seg] = (bundleCounts[seg] || 0) + 1;
  });
  // Also add explicitly listed bundles (static)
  if (!DYNAMIC && BUNDLE_DATA && BUNDLE_DATA.bundles) {
    BUNDLE_DATA.bundles.forEach(function(b) {
      if (!bundleCounts[b]) bundleCounts[b] = 0;
    });
  }
  var bsel = qs('bundle-select');
  Object.keys(bundleCounts).sort().forEach(function(b) {
    var o = document.createElement('option');
    o.value = b; o.textContent = b + ' (' + bundleCounts[b] + ')';
    bsel.appendChild(o);
  });
  bsel.addEventListener('change', doSearch);

  // Activate default tab (Explore)
  switchTab('graph', document.querySelector('.nav-seg-item.active'));

  // Pre-load cosmos in background (dynamic mode)
  if (DYNAMIC) loadCosmosExplore();
}
document.addEventListener('DOMContentLoaded', init);

// ---- Search ----
var currentResults = [];

async function doSearch() {
  var q = qs('search').value;
  var t = qs('type-filter').value;
  var l = qs('lang-filter').value;
  var b = qs('bundle-select').value;
  currentResults = await searchConcepts(q, t, l, DYNAMIC ? 9999 : 0);
  if (b) currentResults = currentResults.filter(function(c) { return c.concept_id && c.concept_id.indexOf(b + '/') === 0; });
  renderTree(currentResults);
  if (qs('detail').classList.contains('hidden')) renderLandingStats(currentResults);
}
qs('search').addEventListener('input', doSearch);
qs('type-filter').addEventListener('change', doSearch);
qs('lang-filter').addEventListener('change', doSearch);

// ---- Tree ----
function renderTree(results) {
  var root = { __children: {}, __concepts: [] };
  results.forEach(function(c) {
    var id = c.concept_id || c.id;
    if (!id) return;
    var parts = id.split('/');
    var folderParts = parts.slice(0, -1);
    var cur = root;
    folderParts.forEach(function(f) {
      cur.__children[f] = cur.__children[f] || { __children: {}, __concepts: [] };
      cur = cur.__children[f];
    });
    cur.__concepts = cur.__concepts || [];
    cur.__concepts.push(c);
  });

  var tree = qs('tree');
  tree.innerHTML = '';
  tree.appendChild(renderFolder(root, ''));
}

function renderFolder(node, path) {
  var wrap = document.createElement('div');
  wrap.className = 'tree-folder';
  var children = node.__children || {};
  var concepts = node.__concepts || [];
  var folderNames = Object.keys(children).sort();

  if (path) {
    var label = document.createElement('div');
    label.className = 'tree-folder-label';
    label.tabIndex = 0;
    label.setAttribute('role', 'button');
    label.setAttribute('aria-expanded', 'true');
    label.innerHTML = '<svg class="caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"></path></svg><span>' + esc(path.split('/').pop()) + '</span>';
    var toggle = function() {
      wrap.classList.toggle('collapsed');
      label.setAttribute('aria-expanded', String(!wrap.classList.contains('collapsed')));
    };
    label.onclick = toggle;
    label.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } };
    wrap.appendChild(label);
  }

  var childWrap = document.createElement('div');
  childWrap.className = 'tree-folder-children';
  folderNames.forEach(function(fname) {
    childWrap.appendChild(renderFolder(children[fname], path ? path + '/' + fname : fname));
  });
  concepts.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); }).forEach(function(c) {
    var leaf = document.createElement('div');
    leaf.className = 'tree-leaf';
    leaf.dataset.id = c.concept_id || c.id;
    leaf.dataset.type = c.type;
    leaf.dataset.title = (c.title || '').toLowerCase();
    leaf.tabIndex = 0;
    leaf.setAttribute('role', 'button');
    leaf.setAttribute('aria-label', c.type + ': ' + c.title);
    var color = TYPE_COLORS[c.type] || '#888';
    leaf.innerHTML = '<span class="dot" style="background:' + color + '" aria-hidden="true"></span><span class="name">' + esc(c.title) + '</span>';
    leaf.onclick = function() { selectConcept(leaf.dataset.id); };
    leaf.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectConcept(leaf.dataset.id); } };
    childWrap.appendChild(leaf);
  });
  wrap.appendChild(childWrap);
  return wrap;
}

// ---- Landing ----
function renderLandingStats(nodes) {
  var types = {}, doms = {}, total = nodes.length;
  nodes.forEach(function(n) {
    types[n.type] = (types[n.type] || 0) + 1;
    var parts = (n.concept_id || n.id || '').split('/');
    var dom = parts.length > 1 ? parts[0] : '(root)';
    doms[dom] = (doms[dom] || 0) + 1;
  });
  var maxDom = Math.max.apply(null, Object.keys(doms).map(function(k) { return doms[k]; })) || 1;
  var sorted = Object.keys(types).sort(function(a, b) { return types[b] - types[a]; });

  var statHtml = '<div class="stat-grid">';
  sorted.forEach(function(t) {
    var color = TYPE_COLORS[t] || '#888';
    statHtml += '<div class="stat-card"><div class="n" style="color:' + color + '">' + types[t] + '</div><div class="l">' + esc(t) + '</div></div>';
  });
  statHtml += '</div>';

  var domHtml = '';
  if (Object.keys(doms).length) {
    domHtml = '<div class="domains"><h3>Domains</h3>';
    var domKeys = Object.keys(doms).sort(function(a, b) { return doms[b] - doms[a]; });
    var totalDomains = domKeys.length;
    if (totalDomains > 12) domKeys = domKeys.slice(0, 12);
    domKeys.forEach(function(d) {
      var pct = Math.round((doms[d] / maxDom) * 100);
      domHtml += '<div class="domain-row" tabindex="0" role="button" onclick="filterToDomain(\'' + d.replace(/'/g,"\\'") + '\')"><span class="name">' + esc(d) + '</span><div class="bar-wrap"><div class="bar" style="width:' + pct + '%"></div></div><span class="count">' + doms[d] + '</span></div>';
    });
    if (totalDomains > 12) domHtml += '<div class="domain-row" style="cursor:default;opacity:.5"><span class="name">+' + (totalDomains - 12) + ' more</span></div>';
    domHtml += '</div>';
  }

  var b = qs('bundle-select').value;
  var label = b || 'All Bundles';
  var heading = total + ' concepts' + (b ? ' in ' + b : '');
  qs('landing').innerHTML = '<div class="eyebrow">' + esc(label) + '</div><h1>' + esc(heading) + '</h1><p class="sub">' + total + ' concepts across ' + Object.keys(doms).length + ' domains.</p>' + statHtml + domHtml;
}

function breadcrumbNav(path) {
  // Try direct path first, then path/index for module concepts
  if (__nodeById[path]) { selectConcept(path); return; }
  if (__nodeById[path + '/index']) { selectConcept(path + '/index'); return; }
  // Fallback: filter by domain
  filterToDomain(path.split('/')[0]);
}

function showLanding() {
  qs('detail').classList.add('hidden');
  qs('detail-header').classList.add('hidden');
  var landing = qs('landing');
  landing.classList.remove('hidden');
  landing.classList.add('fade-in');
  qs('breadcrumb').innerHTML = '<span class="crumb current" onclick="showLanding()">Home</span>';
  document.querySelectorAll('.tree-leaf.active').forEach(function(el) { el.classList.remove('active'); });
  renderLandingStats(currentResults);
}

function filterToDomain(d) {
  qs('search').value = d;
  doSearch();
}

// ---- Detail ----
var currentId = null;
var conceptCache = {};
var egoCy = null;
var globalCy = null;

async function selectConcept(id) {
  qs('landing').classList.add('hidden');
  qs('detail-header').classList.remove('hidden');
  qs('detail').classList.remove('hidden');
  qs('detail').classList.remove('fade-in'); void qs('detail').offsetWidth; qs('detail').classList.add('fade-in');

  document.querySelectorAll('.tree-leaf.active').forEach(function(el) { el.classList.remove('active'); });
  var leaf = document.querySelector('.tree-leaf[data-id="' + id.replace(/"/g,'\\"') + '"]');
  if (leaf) leaf.classList.add('active');

  var c;
  if (conceptCache[id]) { c = conceptCache[id]; }
  else { c = await getConcept(id); conceptCache[id] = c; }
  if (!c) { qs('detail-left').innerHTML = '<p>Concept not found.</p>'; return; }
  currentId = id;
  renderDetail(c);

  // Pre-populate code tab in background
  var _ext = (c.resource || '').split('.').pop();
  var _lang = {js:'javascript',ts:'typescript',py:'python',rb:'ruby',rs:'rust',go:'go',java:'java',kt:'kotlin',cs:'csharp',cpp:'cpp',c:'c',sql:'sql',sh:'bash',yaml:'yaml',json:'json',html:'html',css:'css',toml:'ini',swift:'swift',php:'php',scala:'scala',dart:'dart'}[_ext] || _ext || '';
  var _code = c.code || '';
  if (_code) {
    qs('code-split-source').innerHTML = '<pre><code class="language-' + _lang + '">' + esc(_code) + '</code></pre>';
    var _ce = qs('code-split-source').querySelector('code');
    if (_ce && window.Prism) Prism.highlightElement(_ce);
  }
  showParseTreePrompt(id);

  // Build breadcrumb from concept path segments
  var parts = id.split('/');
  var crumbHtml = '<span class="crumb" onclick="showLanding()">Home</span>';
  if (parts.length > 1) {
    var path = '';
    for (var i = 0; i < parts.length - 1; i++) {
      var seg = parts[i];
      path = path ? path + '/' + seg : seg;
      crumbHtml += '<span class="sep">›</span><span class="crumb" onclick="breadcrumbNav(\'' + esc(path) + '\')">' + esc(seg) + '</span>';
    }
  }
  crumbHtml += '<span class="sep">›</span><span class="crumb current">' + esc(c.title || parts[parts.length - 1]) + '</span>';
  qs('breadcrumb').innerHTML = crumbHtml;
}

function _parseRel(text) {
  if (!text) return [];
  if (Array.isArray(text)) return text;
  var out = [];
  text.split('\n').forEach(function(line) {
    var m = line.match(/\[([^\]]+)\]\(([^)]+)\.md\)/);
    if (m) out.push({ title: m[1], concept_id: m[2] });
  });
  return out;
}

function _parseRelationships(text, type) {
  if (!text) return [];
  var out = [];
  text.split('\n').forEach(function(line) {
    if (line.indexOf('|') !== 0) return;
    var cells = line.split('|').filter(function(c) { return c.trim(); });
    if (cells.length < 2) return;
    var relType = cells[0].trim().toLowerCase();
    if (relType !== type && relType !== type.replace('_', ' ')) return;
    var m = cells[1].match(/\[([^\]]+)\]\(([^)]+)\)/);
    if (m) out.push({ title: m[1], concept_id: m[2].replace(/\.md$/, '') });
  });
  return out;
}

function _parseBullets(text) {
  if (!text) return [];
  if (Array.isArray(text)) return text;
  return text.split('\n').filter(function(l) { return l.trim().indexOf('- ') === 0; }).map(function(l) { return l.trim().slice(2).replace(/`+/g, '').trim(); });
}

var _tsInitialized = false;
var _tsParsers = {};

// Only languages that publish WASM files on npm + CDN
var _tsLangMap = {
  py:'python', js:'javascript', ts:'typescript', rb:'ruby', rs:'rust',
  go:'go', java:'java', cpp:'cpp', c:'c', php:'php',
  // kt: kotlin, cs: csharp, scala, dart, jl: julia, sql — no WASM builds on npm
};
var _tsWasmUrls = {
  python:'https://cdn.jsdelivr.net/npm/tree-sitter-python@0.23.6/tree-sitter-python.wasm',
  javascript:'https://cdn.jsdelivr.net/npm/tree-sitter-javascript@0.25.0/tree-sitter-javascript.wasm',
  typescript:'https://cdn.jsdelivr.net/npm/tree-sitter-typescript@0.23.2/tree-sitter-typescript.wasm',
  ruby:'https://cdn.jsdelivr.net/npm/tree-sitter-ruby@0.23.1/tree-sitter-ruby.wasm',
  rust:'https://cdn.jsdelivr.net/npm/tree-sitter-rust@0.24.0/tree-sitter-rust.wasm',
  go:'https://cdn.jsdelivr.net/npm/tree-sitter-go@0.25.0/tree-sitter-go.wasm',
  java:'https://cdn.jsdelivr.net/npm/tree-sitter-java@0.23.5/tree-sitter-java.wasm',
  cpp:'https://cdn.jsdelivr.net/npm/tree-sitter-cpp@0.23.4/tree-sitter-cpp.wasm',
  c:'https://cdn.jsdelivr.net/npm/tree-sitter-c@0.23.6/tree-sitter-c.wasm',
  php:'https://cdn.jsdelivr.net/npm/tree-sitter-php@0.23.6/tree-sitter-php.wasm',
};

async function getTsParser(langName) {
  if (_tsParsers[langName]) return _tsParsers[langName];
  if (!_tsInitialized) {
    await TreeSitter.init({
      locateFile: function(p) { return 'https://cdn.jsdelivr.net/npm/web-tree-sitter@0.20.8/' + p; }
    });
    _tsInitialized = true;
  }
  var url = _tsWasmUrls[langName];
  if (!url) return null;
  try {
    var lang = await TreeSitter.Language.load(url);
    var parser = new TreeSitter();
    parser.setLanguage(lang);
    _tsParsers[langName] = parser;
    return parser;
  } catch(e) {
    console.warn('Failed to load WASM parser for ' + langName + ': ' + e.message);
    return null;
  }
}

function _tsNodeName(n) {
  return n.type;
}

function _tsNodeText(n, src) {
  try { return src.slice(n.startIndex, n.endIndex); } catch(e) { return ''; }
}

function _renderTsTree(node, src, depth, isLast) {
  var nn = _tsNodeName(node);
  var txt = _tsNodeText(node, src).replace(/\s+/g, ' ').trim();
  if (txt.length > 60) txt = txt.slice(0, 60) + '…';
  var prefix = '';
  for (var i = 0; i < depth; i++) prefix += '  ';
  var hasChildren = node.childCount > 0;
  var line = '';
  if (hasChildren) {
    line += '<div class="parse-node' + (depth === 0 ? ' root' : '') + '" data-depth="' + depth + '">';
    line += '<span class="node-toggle" onclick="toggleParseNode(this)">▶</span>';
    line += '<span class="node-type">' + nn + '</span>';
    if (txt && nn !== 'program' && nn !== 'module' && nn !== 'block' && nn !== 'statement_block' && nn !== 'body' && nn !== 'declaration') {
      line += ' <span class="node-text">' + esc(txt) + '</span>';
    }
    line += '<span class="parse-range">[' + node.startIndex + '-' + node.endIndex + ']</span>';
    line += '<div class="parse-children">';
    for (var j = 0; j < node.childCount; j++) {
      line += _renderTsTree(node.child(j), src, depth + 1, j === node.childCount - 1);
    }
    line += '</div></div>';
  } else {
    var cls = 'node-text';
    if (/^['"]/.test(txt)) cls += ' str';
    else if (/^\d/.test(txt)) cls += ' num';
    else if (/^(return|if|else|for|while|def|class|import|from|let|const|var|function|fn|pub|use|mod|struct|enum|trait|impl|interface|package|val|var|fun)$/.test(txt)) cls += ' kw';
    else if (/^[A-Z]/.test(txt) && txt.length < 40) cls += ' id';
    line += '<div class="parse-node" data-depth="' + depth + '">';
    line += '<span class="node-type">' + nn + '</span>';
    if (txt) line += ' <span class="' + cls + '">' + esc(txt) + '</span>';
    line += '<span class="parse-range">[' + node.startIndex + '-' + node.endIndex + ']</span>';
    line += '</div>';
  }
  return line;
}

function toggleParseNode(el) {
  var node = el.closest('.parse-node');
  if (node) node.classList.toggle('collapsed');
}

async function renderParseTree(id) {
  var container = qs('code-split-parse');
  if (!id) return;
  if (_parseTreeLoaded[id]) return;

  var c = conceptCache[id] || __nodeById[id];
  if (!c) { container.innerHTML = '<div class="empty-note">No concept data.</div>'; return; }

  var src = c.source || c.raw || c.code || c.body || '';
  if (!src) { container.innerHTML = '<div class="empty-note">No source code available.</div>'; return; }

  var ext = (c.resource || '').split('.').pop();
  var langName = _tsLangMap[ext];
  if (!langName || !_tsWasmUrls[langName]) {
    container.innerHTML = '<div class="empty-note">Parse tree is not available for <strong>.' + esc(ext) + '</strong> files. Use the <strong>Source</strong> tab for code view.</div>';
    return;
  }

  container.innerHTML = '<div class="loading">Parsing…</div>';
  var parser = await getTsParser(langName);
  if (!parser) {
    container.innerHTML = '<div class="empty-note">Parse tree could not be loaded for <strong>' + esc(langName) + '</strong>. Switch to <strong>Source</strong> tab for code view.</div>';
    return;
  }

  try {
    var tree = parser.parse(src);
    var root = tree.rootNode;

    // Named-only tree for readability
    function namedChildren(n) {
      var kids = [];
      for (var i = 0; i < n.childCount; i++) {
        var ch = n.child(i);
        if (ch.isNamed) kids.push(ch);
      }
      return kids;
    }

    function renderNamed(node, depth) {
      var nn = node.type;
      var txt = _tsNodeText(node, src).replace(/\s+/g, ' ').trim();
      if (txt.length > 60) txt = txt.slice(0, 60) + '…';
      var kids = namedChildren(node);
      var line = '<div class="parse-node' + (depth === 0 ? ' root' : '') + '">';
      if (kids.length > 0) {
        line += '<span class="node-toggle" onclick="toggleParseNode(this)">▶</span>';
      } else {
        line += '<span class="node-toggle" style="visibility:hidden">▶</span>';
      }
      line += '<span class="node-type">' + nn + '</span>';
      if (txt && kids.length === 0) {
        var cls = 'node-text';
        if (/^['"]/.test(txt)) cls += ' str';
        else if (/^\d/.test(txt)) cls += ' num';
        else if (/^(return|if|else|for|while|def|class|import|from|let|const|var|function|fn|pub|use|mod|struct|enum|trait|impl|interface|package|val|var|fun)$/.test(txt)) cls += ' kw';
        else if (nn === 'identifier' || nn === 'type_identifier') cls += ' id';
        line += ' <span class="' + cls + '">' + esc(txt) + '</span>';
      }
      line += '<span class="parse-range">[' + node.startIndex + '-' + node.endIndex + ']</span>';
      if (kids.length > 0) {
        line += '<div class="parse-children">';
        kids.forEach(function(k) { line += renderNamed(k, depth + 1); });
        line += '</div>';
      }
      line += '</div>';
      return line;
    }

    container.innerHTML = renderNamed(root, 0) + '<div style="margin-top:var(--sp-3);text-align:center"><button onclick="delete _parseTreeLoaded[\'' + id.replace(/'/g,"\\'") + '\'];showParseTreePrompt(\'' + id.replace(/'/g,"\\'") + '\')" style="font-size:11px;padding:4px 12px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer">Re-parse</button></div>';
  } catch(e) {
    container.innerHTML = '<div class="empty-note">Parse error: ' + esc(e.message) + '</div>';
  }
}



// ---- Ego Graph (Cytoscape) ----
function renderEgoGraph(centerId, concept) {
  var result = getEgoElements(centerId, concept);
  var elements = result.elements;
  if (!elements || (Array.isArray(elements) && elements.length === 0) || (elements.nodes && elements.nodes.length < 2)) {
    var cont = qs('ego-graph');
    if (cont) cont.innerHTML = '<div class="loading">No connections</div>';
    return;
  }
  if (egoCy) egoCy.destroy();
  var container = qs('ego-graph');
  if (!container) return;
  container.innerHTML = '';
  var tv = getComputedStyle(document.documentElement);
  var textColor = tv.getPropertyValue('--text').trim();
  var borderColor = tv.getPropertyValue('--border-strong').trim();
  var surf2 = tv.getPropertyValue('--surface-2').trim();

  egoCy = cytoscape({
    container: container,
    elements: elements,
    style: [
      { selector: 'node', style: {
        'label': 'data(label)', 'color': textColor, 'font-size':'10px',
        'text-valign':'bottom', 'text-margin-y':'6px',
        'width': 22, 'height': 22, 'border-width':2, 'border-color': surf2,
        'background-color': function(ele) { return TYPE_COLORS[ele.data('type')] || '#888'; },
      } },
      { selector: 'node[id = "' + centerId + '"]', style: { 'width':32, 'height':32, 'border-width':3, 'border-color': textColor } },
      { selector: 'edge', style: { 'width':1.5, 'line-color': borderColor, 'target-arrow-color': borderColor, 'target-arrow-shape':'triangle', 'curve-style':'bezier', 'arrow-scale':0.6, 'opacity':.7 } },
    ],
    layout: { name: 'concentric', concentric: function(n) { return n.id() === centerId ? 2 : 1; }, levelWidth: function() { return 1; }, minNodeSpacing: 44 },
    userZoomingEnabled: true,
    userPanningEnabled: true,
  });
  egoCy.nodes().forEach(function(n) { n.style('cursor', 'pointer'); });
  egoCy.on('tap', 'node', function(evt) {
    var id = evt.target.id();
    if (id !== centerId) selectConcept(id);
  });
}

function _cosmosInitData() {
  var nodes = (BUNDLE_DATA && BUNDLE_DATA.nodes) || [];
  var links = (BUNDLE_DATA && BUNDLE_DATA.links) || [];
  _cosmosNodes = nodes;
  _cosmosEdges = links;
  _cosmosN = nodes.length;

  var doms = {};
  nodes.forEach(function(n) {
    var parts = (n.id || n.concept_id || '').split('/');
    var d = parts[0] || 'root';
    if (!doms[d]) doms[d] = [];
    doms[d].push(n);
  });
  _cosmosDomainNames = Object.keys(doms).sort();
  _cosmosDomainNames.forEach(function(d, i) {
    (doms[d] || []).forEach(function(n) {
      _cosmosDomIdx[n.id || n.concept_id] = i;
    });
  });

  var deg = new Array(_cosmosN).fill(0);
  links.forEach(function(l) {
    var si = nodes.findIndex(function(n) { return (n.id || n.concept_id) === l.source; });
    var ti = nodes.findIndex(function(n) { return (n.id || n.concept_id) === l.target; });
    if (si >= 0) deg[si]++;
    if (ti >= 0) deg[ti]++;
  });

  _cosmosNodes.forEach(function(n, i) {
    var c = TYPE_COLORS[n.type] || '#888';
    var rgb = _cosmosHexToRgb(c);
    _cosmosPointColors[i*4] = rgb[0]; _cosmosPointColors[i*4+1] = rgb[1];
    _cosmosPointColors[i*4+2] = rgb[2]; _cosmosPointColors[i*4+3] = 0.92;
  });

  qs('status-n').textContent = _cosmosN;
  qs('status-e').textContent = _cosmosEdges.length;

  var legendBody = qs('cosmos-legend-body');
  legendBody.innerHTML = '';
  var typeCounts = {};
  _cosmosNodes.forEach(function(n) { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });
  Object.keys(TYPE_COLORS).forEach(function(t) {
    var row = document.createElement('div');
    row.className = 'legend-item';
    var cnt = typeCounts[t] || 0;
    row.innerHTML = '<span class="dot" style="background:' + TYPE_COLORS[t] + '"></span><span>' + t + '</span><span class="count">' + cnt + '</span>';
    legendBody.appendChild(row);
  });

  _cosmosActiveTypes = new Set(Object.keys(TYPE_COLORS));
  
  // Type dropdown
  var typeList = qs('type-list');
  typeList.innerHTML = '';
  Object.keys(TYPE_COLORS).forEach(function(t) {
    var cnt = typeCounts[t] || 0;
    var item = document.createElement('div');
    item.className = 'dropdown-item on';
    item.innerHTML = '<div class="item-left"><span class="dot" style="background:' + TYPE_COLORS[t] + '"></span><span class="item-cb"></span><span>' + t + '</span></div><span class="item-count">' + cnt + '</span>';
    item.onclick = function() {
      if (_cosmosActiveTypes.has(t)) { _cosmosActiveTypes.delete(t); item.classList.remove('on'); }
      else { _cosmosActiveTypes.add(t); item.classList.add('on'); }
      _cosmosFilterChanged();
    };
    typeList.appendChild(item);
  });

  // Bundle dropdown
  var bundleNames = {};
  _cosmosNodes.forEach(function(n) { var b = (n.id || n.concept_id || '').split('/')[0] || 'root'; bundleNames[b] = (bundleNames[b] || 0) + 1; });
  var bundleKeys = Object.keys(bundleNames).sort();
  _cosmosActiveBundles = new Set(bundleKeys);
  var bundleList = qs('bundle-list');
  bundleList.innerHTML = '';
  bundleKeys.forEach(function(b) {
    var item = document.createElement('div');
    item.className = 'dropdown-item on';
    item.innerHTML = '<div class="item-left"><span class="item-cb"></span><span>' + esc(b) + '</span></div><span class="item-count">' + bundleNames[b] + '</span>';
    item.onclick = function() {
      if (_cosmosActiveBundles.has(b)) { _cosmosActiveBundles.delete(b); item.classList.remove('on'); }
      else { _cosmosActiveBundles.add(b); item.classList.add('on'); }
      _cosmosFilterChanged();
      updateBundleBadge();
    };
    bundleList.appendChild(item);
  });
  updateBundleBadge();

  var labelRoot = qs('cluster-labels');

  var labelRoot = qs('cluster-labels');
  labelRoot.innerHTML = '';
  _cosmosDomainNames.forEach(function(d) {
    var el = document.createElement('div');
    el.className = 'cluster-label'; el.textContent = d;
    labelRoot.appendChild(el);
  });

  _canvas2DSwitch();
  loadingEl.classList.add('hide');
  _cosmosLoaded = true;
  _cosmosLoading = false;

  // Populate default sidebar stats
  var statsHtml = '';
  var typeCounts = {};
  _cosmosNodes.forEach(function(n) { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });
  Object.keys(typeCounts).sort().forEach(function(t) {
    var c = TYPE_COLORS[t] || '#888';
    statsHtml += '<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 12px;min-width:70px"><div style="font-size:16px;font-weight:700;color:' + c + '">' + typeCounts[t] + '</div><div style="font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px">' + t + '</div></div>';
  });
  var defStats = qs('gs-default-stats');
  if (defStats) defStats.innerHTML = statsHtml;
}

var _cosmosSearchTimer;
(function() {
  var searchEl = qs('cosmos-search');
  if (!searchEl) return;
  searchEl.addEventListener('input', function(e) {
    clearTimeout(_cosmosSearchTimer);
    var q = e.target.value.trim().toLowerCase();
    _cosmosSearchTimer = setTimeout(function() {
      _cosmosMatchSet = q ? new Set(_cosmosNodes.map(function(n,i){ return [n,i]; }).filter(function(p){ return (p[0].title||'').toLowerCase().includes(q); }).map(function(p){ return p[1]; })) : null;
      _cosmosFilterChanged();
    }, 120);
  });
})();

// Hover tag
var _cosmosHoverEl = qs('hover-tag');
function _cosmosShowHoverTag(idx) {
  var n = _cosmosNodes[idx];
  if (!n) return;
  _cosmosHoverEl.innerHTML = (n.title || '') + '<span class="type">' + (n.type || '') + '</span>';
  _cosmosHoverEl.classList.add('show');
  _cosmosPosHoverTag();
}
function _cosmosHideHoverTag() { _cosmosHoverEl.classList.remove('show'); }
function _cosmosPosHoverTag() { _cosmosHoverEl.style.left = _cosmosPtrX + 'px'; _cosmosHoverEl.style.top = _cosmosPtrY + 'px'; }

function cosmosZoom(f) {}
function cosmosTogglePhysics() {}
function cosmosReset() {}

// ---- Dropdown Toggle ----
var _openDropdown = null;
function toggleDropdown(name) {
  var menu = qs(name + '-menu');
  if (!menu) return;
  if (_openDropdown && _openDropdown !== menu) _openDropdown.classList.remove('open');
  menu.classList.toggle('open');
  _openDropdown = menu.classList.contains('open') ? menu : null;
}
function updateBundleBadge() {
  var active = _cosmosActiveBundles ? _cosmosActiveBundles.size : 0;
  var total = _cosmosActiveBundles ? _cosmosNodes.reduce(function(s,n) { var b=(n.id||n.concept_id||'').split('/')[0]||'root'; s.add(b); return s; }, new Set()).size : 0;
  var badge = qs('bundle-badge');
  if (badge) badge.textContent = active < total ? '' + active : 'All';
}
document.addEventListener('click', function(e) {
  if (_openDropdown && !e.target.closest('.dropdown-wrapper')) {
    _openDropdown.classList.remove('open');
    _openDropdown = null;
  }
});
window.cosmosZoom = cosmosZoom;
window.cosmosReset = cosmosReset;

// ---- Tab Switching ----
function switchTab(name, btn) {
  document.querySelectorAll('.nav-seg-item').forEach(function(t) { t.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  qs('tab-' + name).classList.add('active');
  if (name === 'graph') {
    qs('main').classList.add('wide');
    loadCosmosExplore();
  } else {
    qs('main').classList.remove('wide');
  }
}

// ---- Theme ----
(function() {
  var t = localStorage.getItem('okf-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
function toggleTheme() {
  var html = document.documentElement;
  var cur = html.getAttribute('data-theme');
  var next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('okf-theme', next);
  if (egoCy) { var c = conceptCache[currentId]; if (c) renderEgoGraph(currentId, c); }
}

// ---- Sidebar resize ----
(function() {
  var sidebar = qs('sidebar');
  var handle = qs('sidebar-resize');
  if (!sidebar || !handle) return;
  var isResizing = false;
  handle.addEventListener('mousedown', function(e) {
    isResizing = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    var newWidth = Math.max(180, Math.min(600, e.clientX));
    sidebar.style.width = newWidth + 'px';
    sidebar.style.flex = 'none';
  });
  document.addEventListener('mouseup', function() {
    if (isResizing) {
      isResizing = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== qs('search')) { qs('search').focus(); e.preventDefault(); }
  if (e.key === ' ' && e.target === document.body) { e.preventDefault(); }
});
</script>
</body>
